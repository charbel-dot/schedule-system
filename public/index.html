<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0369a1" />
  <meta name="description" content="New Tronics Dispatch — assign workers to job sites and track live status." />
  <title>New Tronics — Dispatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230369a1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='4' width='18' height='18' rx='2'/%3E%3Cline x1='16' y1='2' x2='16' y2='6'/%3E%3Cline x1='8' y1='2' x2='8' y2='6'/%3E%3Cline x1='3' y1='10' x2='21' y2='10'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Leaflet (real street maps) is loaded on demand by app.js when the Map tab
       is opened, so the app starts instantly and works fully offline. -->
</head>
<body>
  <div id="loadbar"></div>

  <!-- Login -->
  <div id="login" class="login-screen">
    <div class="login-card">
      <div class="login-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
      </div>
      <h1>New Tronics Dispatch</h1>
      <p class="hint">Manager sign in</p>
      <form id="login-form" onsubmit="event.preventDefault(); doLogin();">
        <div class="field">
          <label for="login-pw">Password</label>
          <div class="input-wrap">
            <input id="login-pw" type="password" placeholder="Enter password" autocomplete="current-password" autofocus />
            <button type="button" class="reveal" aria-label="Show password" onclick="togglePw(this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn" style="width:100%">Sign in</button>
      </form>
      <div class="error-text" id="login-error" role="alert"></div>
      <p class="hint" style="margin-top:18px">Enter the manager password to sign in.</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sb-brand">
        <span class="logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="m9 16 2 2 4-4"/></svg></span>
        <span class="name"><b>New Tronics</b><small>Dispatch</small></span>
      </div>
      <div class="sb-section">Menu</div>
      <nav class="sb-nav" aria-label="Primary">
        <button class="sb-link active" data-view="board" title="Board" onclick="go('board')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span class="sb-label">Board</span></button>
        <button class="sb-link" data-view="week" title="Week" onclick="go('week')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="sb-label">Week</span></button>
        <button class="sb-link" data-view="map" title="Map" onclick="go('map')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg><span class="sb-label">Map</span></button>
        <button class="sb-link" data-view="bookings" title="Bookings" onclick="go('bookings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M9 15l2 2 4-4"/></svg><span class="sb-label">Bookings</span></button>
        <button class="sb-link" data-view="workers" title="Workers" onclick="go('workers')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="sb-label">Workers</span></button>
        <button class="sb-link" data-view="sites" title="Sites" onclick="go('sites')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9v.01M9 12v.01M9 15v.01M9 18v.01"/></svg><span class="sb-label">Sites</span></button>
        <button class="sb-link" data-view="reports" title="Reports" onclick="go('reports')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg><span class="sb-label">Reports</span></button>
      </nav>
      <div class="sb-foot">
        <button class="sb-link sb-collapse" id="sb-collapse" title="Collapse sidebar" aria-label="Collapse sidebar" onclick="toggleCollapse()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg><span class="sb-label">Collapse</span></button>
        <button class="sb-link signout" title="Sign out" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span class="sb-label">Sign out</span></button>
        <div class="sb-ver">New Tronics Dispatch · v1.0</div>
      </div>
    </aside>
    <div class="sb-backdrop" id="sb-backdrop" onclick="closeSidebar()"></div>

    <div class="main">
      <header class="mobilebar">
        <button class="hamburger" aria-label="Open menu" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="brand"><span class="logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span> New Tronics</div>
      </header>
      <main class="container" id="view"></main>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root" aria-live="polite" aria-atomic="false"></div>

  <script src="app.js"></script>
</body>
</html>
